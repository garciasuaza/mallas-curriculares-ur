<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis de Mallas Curriculares · Decanatura FE UR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1A1714;
    --crimson: #C00000;
    --accent:  #C8B560;
    --surface: #FFFFFF;
    --border:  #E2DDD6;
    --text:    #1A1714;
    --muted:   #7A756F;
    --bar-h:   48px;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #F7F5F0; }

  /* ── ÚNICA BARRA ─────────────────────────────── */
  .topbar {
    height: var(--bar-h);
    background: var(--navy);
    display: flex;
    align-items: stretch;
    padding: 0 1.25rem 0 1rem;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 300;
  }

  /* Tabs */
  .tab-btn {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: 0 1rem;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: rgba(255,255,255,.45);
    font-size: .75rem;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: rgba(255,255,255,.8); }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: var(--accent);
  }

  .tab-chip {
    font-size: 9px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .chip-ur  { background: rgba(184,68,68,.35);  color: #ffb3b3; }
  .chip-ref { background: rgba(12,68,124,.35);  color: #90c4f8; }

  .tab-tag {
    font-size: .63rem;
    padding: 1px 6px;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: .01em;
  }
  .tag-propuesta { background: rgba(200,181,96,.2); color: var(--accent); }
  .tag-ref       { background: rgba(100,160,255,.15); color: #90c4f8; }

  /* ── IFRAMES ─────────────────────────────────── */
  .pane {
    display: none;
    width: 100%;
    height: calc(100vh - var(--bar-h));
  }
  .pane.active { display: block; }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<nav class="topbar" role="tablist" aria-label="Vistas de análisis">

  <button class="tab-btn active"
          role="tab" aria-selected="true"
          aria-controls="pane-ur" id="tab-ur"
          onclick="switchTab('ur')">
    <span class="tab-chip chip-ur">UR</span>
    Propuesta de mallas v3
    <span class="tab-tag tag-propuesta">Propuesta</span>
  </button>

  <button class="tab-btn"
          role="tab" aria-selected="false"
          aria-controls="pane-ice" id="tab-ice"
          onclick="switchTab('ice')">
    <span class="tab-chip chip-ref">IC</span>
    Mallas Icesi
    <span class="tab-tag tag-ref">Referencia comparativa</span>
  </button>


</nav>

<div class="pane active" id="pane-ur" role="tabpanel" aria-labelledby="tab-ur">
  <iframe src="mallas_ur_v3.html" title="Propuesta mallas UR v3" loading="eager"></iframe>
</div>

<div class="pane" id="pane-ice" role="tabpanel" aria-labelledby="tab-ice">
  <iframe src="icesi_mallas_comparativo.html" title="Mallas Icesi — referencia comparativa" loading="lazy"></iframe>
</div>

<script>
  function switchTab(key) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const on = btn.id === 'tab-' + key;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-selected', on);
    });
    document.querySelectorAll('.pane').forEach(p => {
      p.classList.toggle('active', p.id === 'pane-' + key);
    });
    history.replaceState(null, '', '#' + key);
  }
  (function () {
    const h = location.hash.replace('#', '');
    if (h === 'ice' || h === 'ur') switchTab(h);
  })();
</script>

</body>
</html>
