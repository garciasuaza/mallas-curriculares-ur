<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis de Mallas Curriculares · Decanatura FE UR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #1A1714;
    --navy2:  #2D3748;
    --crimson:#C00000;
    --accent: #C8B560;
    --bg:     #F7F5F0;
    --surface:#FFFFFF;
    --border: #E2DDD6;
    --text:   #1A1714;
    --text-light: #7A756F;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── HEADER ─────────────────────────────────────── */
  .site-header {
    background: var(--navy);
    color: #fff;
    padding: 1.8rem 2rem 1.4rem;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent, transparent 60px,
      rgba(255,255,255,.03) 60px,
      rgba(255,255,255,.03) 61px
    );
    pointer-events: none;
  }
  .header-inner {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: .35rem;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    line-height: 1.1;
  }
  .header-title em { font-style: italic; color: var(--accent); }
  .header-sub {
    font-size: .78rem;
    color: rgba(255,255,255,.45);
    font-weight: 300;
    margin-top: .3rem;
  }
  .header-meta {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .badge {
    font-size: .68rem;
    padding: .2rem .75rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,.2);
    color: rgba(255,255,255,.65);
    white-space: nowrap;
  }
  .badge-accent {
    background: rgba(200,181,96,.15);
    border-color: rgba(200,181,96,.4);
    color: var(--accent);
  }

  /* ── TAB NAV ─────────────────────────────────────── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
  }
  .tab-nav-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: stretch;
    gap: 0;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: .55rem;
    padding: .85rem 1.25rem;
    font-size: .78rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-light);
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: none;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: var(--crimson); }
  .tab-btn.active {
    color: var(--crimson);
    border-bottom-color: var(--crimson);
    font-weight: 600;
  }
  .tab-icon {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .icon-ur   { background: #FCE8E8; color: #B84444; }
  .icon-ice  { background: #DBEAFE; color: #0C447C; }
  .tab-desc {
    font-size: .68rem;
    font-weight: 400;
    color: var(--text-light);
    margin-left: .15rem;
  }
  .tab-btn.active .tab-desc { color: rgba(192,0,0,.55); }

  /* ── IFRAME WRAPPER ──────────────────────────────── */
  .view-area {
    width: 100%;
    /* full viewport minus header (~120px) and tab nav (~46px) */
    height: calc(100vh - 170px);
    min-height: 600px;
    display: none;
    border: none;
    background: var(--bg);
  }
  .view-area.active { display: block; }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── FOOTER ──────────────────────────────────────── */
  .site-footer {
    background: var(--navy);
    color: rgba(255,255,255,.35);
    font-size: .7rem;
    text-align: center;
    padding: .75rem 2rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Decanatura Facultad de Economía · UR</div>
      <h1 class="header-title">Análisis de <em>Mallas Curriculares</em></h1>
      <p class="header-sub">Planeación estratégica · Propuesta de integración · Reformas de programas</p>
    </div>
    <div class="header-meta">
      <span class="badge badge-accent">Documento de trabajo</span>
      <span class="badge">2 artefactos</span>
      <span class="badge">Mayo 2026</span>
    </div>
  </div>
</header>

<!-- TAB NAV -->
<nav class="tab-nav" role="tablist" aria-label="Artefactos de análisis">
  <div class="tab-nav-inner">

    <button class="tab-btn active"
            role="tab"
            aria-selected="true"
            aria-controls="pane-ur"
            id="tab-ur"
            onclick="switchTab('ur')">
      <span class="tab-icon icon-ur">UR</span>
      Mallas UR — Propuesta v3
      <span class="tab-desc">· Programas de pregrado · Escuela</span>
    </button>

    <button class="tab-btn"
            role="tab"
            aria-selected="false"
            aria-controls="pane-ice"
            id="tab-ice"
            onclick="switchTab('ice')">
      <span class="tab-icon icon-ice">IC</span>
      Icesi — Comparativo de mallas
      <span class="tab-desc">· Benchmarking curricular</span>
    </button>

  </div>
</nav>

<!-- CONTENT PANES -->
<main>
  <div class="view-area active" id="pane-ur" role="tabpanel" aria-labelledby="tab-ur">
    <iframe src="mallas_ur_v3.html"
            title="Mallas Curriculares UR v3"
            loading="eager"></iframe>
  </div>

  <div class="view-area" id="pane-ice" role="tabpanel" aria-labelledby="tab-ice">
    <iframe src="icesi_mallas_comparativo.html"
            title="Icesi — Comparativo de Mallas"
            loading="lazy"></iframe>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  Facultad de Economía · Universidad del Rosario — Documento interno de trabajo
</footer>

<script>
  function switchTab(key) {
    // Update buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const isActive = btn.id === 'tab-' + key;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive);
    });
    // Update panes
    document.querySelectorAll('.view-area').forEach(pane => {
      pane.classList.toggle('active', pane.id === 'pane-' + key);
    });
    // Persist selection in URL hash for shareable deep links
    history.replaceState(null, '', '#' + key);
  }

  // On load, honour URL hash if present
  (function () {
    const hash = location.hash.replace('#', '');
    if (hash === 'ice' || hash === 'ur') switchTab(hash);
  })();
</script>

</body>
</html>
