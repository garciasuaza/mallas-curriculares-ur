<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reforma Curricular · Facultad de Economía · Universidad del Rosario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ur-red:      #DA0921;
  --ur-red-dark: #A80018;
  --ur-purple:   #3100A0;
  --ur-navy:     #190056;
  --ur-white:    #FFFFFF;
  --ur-gray-f:   #F5F4F2;
  --ur-gray-e:   #E8E5E0;
  --ur-gray-70:  #4D4D4D;
  --ur-gray-50:  #808080;
  --header-h:    56px;
  --nav-h:       44px;
  --total-h:     calc(var(--header-h) + var(--nav-h));
}
html, body { height: 100%; font-family: Calibri, 'Trebuchet MS', Arial, sans-serif; background: var(--ur-gray-f); color: var(--ur-gray-70); }

/* ── HEADER ─────────────────────────────────────────── */
.header {
  height: var(--header-h);
  background: var(--ur-red);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 400;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.header-brand { display: flex; align-items: center; gap: 1rem; }
.ur-escudo { width: 34px; height: 34px; flex-shrink: 0; opacity: .92; }
.header-text { display: flex; flex-direction: column; gap: 1px; }
.header-univ { font-size: .65rem; font-weight: 400; color: rgba(255,255,255,.8); letter-spacing: .08em; text-transform: uppercase; }
.header-rosario { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; color: var(--ur-white); letter-spacing: .04em; line-height: 1; }
.header-divider { width: 1px; height: 28px; background: rgba(255,255,255,.35); margin: 0 .5rem; }
.header-dept { display: flex; flex-direction: column; gap: 1px; }
.header-dept-label { font-size: .58rem; color: rgba(255,255,255,.65); letter-spacing: .06em; text-transform: uppercase; }
.header-dept-name  { font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.95); }
.header-meta { display: flex; align-items: center; gap: .5rem; }
.header-badge { font-size: .62rem; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: .04em; text-transform: uppercase; background: rgba(255,255,255,.18); color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.25); }
.header-year { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: rgba(255,255,255,.55); letter-spacing: .05em; }

/* ── NAVBAR ─────────────────────────────────────────── */
.navbar {
  height: 44px;
  background: #ffffff;
  display: flex; align-items: stretch;
  padding: 0 1rem; gap: 0;
  position: sticky; top: var(--header-h); z-index: 300;
  border-bottom: 2px solid var(--ur-navy);
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}
.nav-item { position: relative; display: flex; align-items: stretch; }
.nav-btn {
  display: flex; align-items: center; gap: .4rem;
  padding: 0 1rem;
  border: none; border-bottom: 3px solid transparent;
  background: none; cursor: pointer;
  font-family: Calibri, 'Trebuchet MS', Arial, sans-serif;
  color: var(--ur-gray-50); font-size: .82rem; font-weight: 600;
  white-space: nowrap;
  transition: color .15s, border-color .15s, background .15s;
}
.nav-btn:hover { color: var(--ur-navy); background: rgba(25,0,86,.04); }
.nav-btn.active { color: var(--ur-navy); border-bottom-color: var(--ur-red); background: rgba(218,9,33,.04); }
.nav-arrow { font-size: .6rem; opacity: .55; transition: transform .15s; }
.nav-item.open .nav-arrow { transform: rotate(180deg); }
.nav-item.open > .nav-btn { color: var(--ur-navy); background: rgba(25,0,86,.04); }

.dd-menu {
  display: none;
  position: absolute; top: calc(100% + 2px); left: 0;
  background: #fff;
  border: 1px solid var(--ur-gray-e);
  border-radius: 0 0 6px 6px;
  box-shadow: 0 6px 16px rgba(0,0,0,.12);
  min-width: 200px; z-index: 500;
}
.nav-item.open .dd-menu { display: block; }
.dd-item {
  display: flex; align-items: center; gap: .6rem;
  width: 100%; padding: .6rem 1rem;
  border: none; background: none; cursor: pointer;
  font-family: Calibri, 'Trebuchet MS', Arial, sans-serif;
  font-size: .78rem; color: var(--ur-gray-70); text-align: left;
  transition: background .1s;
}
.dd-item:hover { background: var(--ur-gray-f); color: var(--ur-navy); }
.dd-item.active { color: var(--ur-red); font-weight: 600; }
.dd-chip {
  font-size: .6rem; font-weight: 700; letter-spacing: .04em;
  padding: 1px 6px; border-radius: 2px; color: #fff; flex-shrink: 0;
}

/* ── PANES ──────────────────────────────────────────── */
.pane { display: none; width: 100%; height: calc(100vh - var(--total-h)); }
.pane.active { display: block; }
iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<!-- ── HEADER INSTITUCIONAL ─────────────────────────── -->
<header class="header">
  <div class="header-brand">
    <div class="header-text">
      <span class="header-univ">Universidad del</span>
      <span class="header-rosario">Rosario</span>
    </div>
  </div>
  <div class="header-meta">
    <span class="header-badge">Reforma Curricular</span>
    <span class="header-year">2026</span>
  </div>
</header>

<!-- ── NAV TABS ─────────────────────────────────────── -->
<nav class="navbar" role="navigation">

  <div class="nav-item">
    <button class="nav-btn active" id="tab-inicio" onclick="switchTab('inicio')">
      INICIO
    </button>
  </div>

  <div class="nav-item" id="dd-reforma">
    <button class="nav-btn" onclick="toggleDrop('dd-reforma')">
      Reformas <span class="nav-arrow">▾</span>
    </button>
    <div class="dd-menu">
      <button class="dd-item" id="tab-mallas" onclick="switchTab('mallas')">
        <span class="dd-chip" style="background:#DA0921;">MALLAS</span> Mallas curriculares
      </button>
      <button class="dd-item" id="tab-art" onclick="switchTab('art')">
        <span class="dd-chip" style="background:#3100A0;">ART</span> Articulación
      </button>
      <button class="dd-item" id="tab-blq" onclick="switchTab('blq')">
        <span class="dd-chip" style="background:#065F46;">BLQ</span> Bloques
      </button>
    </div>
  </div>

  <div class="nav-item" id="dd-recursos">
    <button class="nav-btn" onclick="toggleDrop('dd-recursos')">
      Recursos <span class="nav-arrow">▾</span>
    </button>
    <div class="dd-menu">
      <button class="dd-item" id="tab-nbc" onclick="switchTab('nbc')">
        <span class="dd-chip" style="background:#3100A0;">NBC</span> Núcleos comunes
      </button>
      <button class="dd-item" id="tab-ped" onclick="switchTab('ped')">
        <span class="dd-chip" style="background:#E8670C;">PED</span> Modelo Pedagógico
      </button>
      <button class="dd-item" id="tab-act" onclick="switchTab('act')">
        <span class="dd-chip" style="background:#190056;">ACT</span> Actividades
      </button>
    </div>
  </div>

  <div class="nav-item" id="dd-referencia">
    <button class="nav-btn" onclick="toggleDrop('dd-referencia')">
      Referencia <span class="nav-arrow">▾</span>
    </button>
    <div class="dd-menu">
      <button class="dd-item" id="tab-men" onclick="switchTab('men')">
        <span class="dd-chip" style="background:#7C3AED;">MEN</span> Menores
      </button>
      <button class="dd-item" id="tab-ice" onclick="switchTab('ice')">
        <span class="dd-chip" style="background:#190056;">IC</span> Icesi
      </button>
    </div>
  </div>

</nav>

<!-- ── PANES ─────────────────────────────────────────── -->
<div class="pane active" id="pane-inicio" role="tabpanel" aria-labelledby="tab-inicio">
  <iframe src="web/inicio.html" title="Panel general — inicio" loading="eager"></iframe>
</div>

<div class="pane" id="pane-mallas" role="tabpanel" aria-labelledby="tab-mallas">
  <iframe src="web/mallas_programas.html" title="Mallas por programa — semestre a semestre" loading="eager"></iframe>
</div>

<div class="pane" id="pane-art" role="tabpanel" aria-labelledby="tab-art">
  <iframe src="web/articulacion.html" title="Articulación entre programas" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-blq" role="tabpanel" aria-labelledby="tab-blq">
  <iframe src="web/bloques.html" title="Créditos por bloque" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-act" role="tabpanel" aria-labelledby="tab-act">
  <iframe src="web/actividades.html" title="Actividades en progreso" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-nbc" role="tabpanel" aria-labelledby="tab-nbc">
  <iframe src="web/nbc.html" title="Núcleo Básico Común — cursos compartidos" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-ped" role="tabpanel" aria-labelledby="tab-ped">
  <iframe src="web/pedagogia.html" title="Principios pedagógicos" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-men" role="tabpanel" aria-labelledby="tab-men">
  <iframe src="web/menores.html" title="Menores de pregrado" loading="lazy"></iframe>
</div>

<div class="pane" id="pane-ice" role="tabpanel" aria-labelledby="tab-ice">
  <iframe src="web/icesi_mallas_comparativo.html" title="Mallas Icesi — referencia comparativa" loading="lazy"></iframe>
</div>

<script>
const TABS = ['inicio','mallas','art','blq','nbc','ped','act','men','ice'];
const DD_PARENT = {
  mallas:'dd-reforma', art:'dd-reforma', blq:'dd-reforma',
  nbc:'dd-recursos', ped:'dd-recursos', act:'dd-recursos',
  men:'dd-referencia', ice:'dd-referencia'
};

function switchTab(key) {
  // panes
  TABS.forEach(k => {
    const pane = document.getElementById('pane-' + k);
    if (pane) pane.classList.toggle('active', k === key);
  });
  // active on direct buttons (inicio)
  document.querySelectorAll('.nav-btn[id^="tab-"]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.dd-item[id^="tab-"]').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('tab-' + key);
  if (activeBtn) activeBtn.classList.add('active');
  // highlight parent dropdown toggle
  document.querySelectorAll('.nav-item > .nav-btn').forEach(b => b.classList.remove('active'));
  const ddId = DD_PARENT[key];
  if (ddId) {
    const toggle = document.querySelector('#' + ddId + ' > .nav-btn');
    if (toggle) toggle.classList.add('active');
  } else {
    // direct button (inicio)
    const directBtn = document.querySelector('.nav-btn#tab-' + key);
    if (directBtn) directBtn.classList.add('active');
  }
  // close all dropdowns
  document.querySelectorAll('.nav-item').forEach(d => d.classList.remove('open'));
  history.replaceState(null, '', '#' + key);
}

function toggleDrop(id) {
  const item = document.getElementById(id);
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.nav-item').forEach(d => d.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
}

// close on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.nav-item')) {
    document.querySelectorAll('.nav-item').forEach(d => d.classList.remove('open'));
  }
});

// init from hash
(function() {
  const h = location.hash.replace('#','');
  if (TABS.includes(h)) switchTab(h);
})();
</script>
</body>
</html>
